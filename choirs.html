        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;

            font-size: 0.9rem;

        .header-section h2 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; margin: 0; color: #111; text-transform: uppercase; letter-spacing: 2px; }

        .choir-card {

        .choir-card-info { padding: 20px; text-align: center; }
        .choir-card-info h3 { margin: 0; font-size: 1.1rem; color: #111; min-height: 3rem; display: flex; align-items: center; justify-content: center; }

        /* Modal Settings */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px); overflow-y: auto;
        }
        .modal-content {
            background-color: #fff; margin: 40px auto; width: 95%; max-width: 1000px;
            border-radius: 15px; position: relative; animation: fadeIn 0.4s; overflow: hidden;
        }
        @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }

            position: absolute; right: 20px; top: 20px; font-size: 30px;
            color: #fff; cursor: pointer; z-index: 2100; background: rgba(0,0,0,0.5);
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        .modal-banner { width: 100%; height: 400px; background-size: cover; background-position: center; position: relative; }
        .modal-body { padding: 50px; }
        
        .section-title { 
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem; color: #D4AF37; 
            letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #eee;
            padding-bottom: 10px; margin: 40px 0 20px; font-weight: 700;
        }

        .history-text { white-space: pre-line; color: #555; font-size: 1rem; text-align: justify; margin-bottom: 30px; }

        .member-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

    // ฟังก์ชันแยกภาษาไทยและอังกฤษ
    function formatNames(text) {
        if (!text || text === '-') return '-';
        
        const names = text.split(/,|\n/).map(n => n.trim()).filter(n => n !== "");
        
        return names.map(name => {
            let cleanName = name.replace(/^\d+\.\s*/, '');
            let parts = cleanName.split(/\s*[—–-]\s*/);
            
            if (parts.length > 1) {
                return `
                    <span class="name-row">
                        ${parts[0].trim()}<br>
                        <span class="eng-name">${parts[1].trim()}</span>
                    </span>`;
            } else {
                let match = cleanName.match(/([^\w\s]+)\s+([A-Z\s]+)/);
                if (match) {
                    return `
                        <span class="name-row">
                            ${match[1].trim()}<br>
                            <span class="eng-name">${match[2].trim()}</span>
                        </span>`;
                }
                return `<span class="name-row">${cleanName}</span>`;
            }
        }).join('');
    }

    function createCards() {
        const grid = document.getElementById('choirGrid');
        grid.innerHTML = ''; 
        choirs.forEach(choir => {
            const card = document.createElement('div');
            card.className = 'choir-card';
            card.onclick = () => openModal(choir.id);
            card.innerHTML = `
                <div class="choir-card-img" style="background-image: url('${choir.img}')"></div>
                <div class="choir-card-info">
                    <h3>${choir.name}</h3>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function openModal(id) {
        const data = choirs.find(c => c.id === id);
        if (!data) return;

        // ดึงรายชื่อนักร้อง
        let membersHtml = '';
        for (const [part, list] of Object.entries(data.members)) {
            membersHtml += `
                <div>
                    <span class="member-part-title">${part}</span>
                    <div style="margin-bottom:20px;">${formatNames(list)}</div>
                </div>
            `;
        }

        // จัดการระบบตำแหน่งพิเศษ (รองรับหลายตำแหน่งด้วย Array)
        let extraHtml = '';
        if (data.extraInfo) {
            const extras = Array.isArray(data.extraInfo) ? data.extraInfo : [data.extraInfo];
            extras.forEach(info => {
                extraHtml += `
                    <div>
                        <span class="member-part-title">${info.label}</span>
                        <div style="margin-bottom:20px;">${formatNames(info.content)}</div>
                    </div>
                `;
            });
        }

        // สร้าง HTML รวมของ Modal
        const html = `
            <div class="modal-banner" style="background-image: url('${data.img}')"></div>
            <div class="modal-body">
                <h2 style="margin:0; font-family:Montserrat; font-size:2.2rem; color:#111;">${data.name}</h2>
                <p style="color:#D4AF37; margin:10px 0 0; font-weight:600; text-transform:uppercase; letter-spacing:1px; font-size:0.9rem;">${data.sub}</p>
                
                <div class="section-title">Biography</div>
                <div class="history-text">${data.history}</div>

                <div class="section-title">Director & Accompanist</div>
                <div class="member-grid">
                    <div>
                        <span class="member-part-title">Conductor</span>
                        <div style="margin-bottom:20px;">${formatNames(data.conductor)}</div>
                    </div>
                    ${data.pianist && data.pianist !== '-' ? `
                    <div>
                        <span class="member-part-title">Pianist</span>
                        <div style="margin-bottom:20px;">${formatNames(data.pianist)}</div>
                    </div>` : ''}
                    ${extraHtml}
                </div>

                <div class="section-title">Choir Members</div>
                <div class="member-grid">
                    ${membersHtml}
                </div>
            </div>
        `;

        document.getElementById('modalData').innerHTML = html;
        document.getElementById('choirModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('choirModal').style.display = 'none';
    }

    // ปิด Modal เมื่อคลิกพื้นที่ว่างข้างนอก
    window.onclick = function(event) {
        const modal = document.getElementById('choirModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // โหลดหน้าจอเริ่มต้น
    window.onload = createCards;
</script>

</body>
</html>
